# =============================================================================
# Deploy da spike (e, depois, do app) para GitHub Pages.
#
# PRE-REQUISITO MANUAL (uma vez, pelo dono do repo):
#   Settings -> Pages -> Source: "GitHub Actions".
#   Sem isso o deploy-pages falha por falta de ambiente Pages habilitado.
#
# Dispara em push para a branch da spike e para main. Builda com Vite
# (base "./" no vite.config.ts cobre o subpath /<repo>/ do Pages) e publica o
# dist/. NAO acionar manualmente nesta fase — sem push.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [fase-0-persistencia-spike, main]

# Permissoes minimas exigidas pelo deploy-pages (OIDC + escrita no Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Uma fila por branch; nao cancela um deploy em andamento.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
